document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e, saved:null };\n  }\n\n  componentDidMount(){\n    this._layout();\n    this._onResize = ()=>{ this._layout(); this.pages={}; this._clamp(); this.forceUpdate(); };\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e)=>{\n      if(this.state.tocOpen && e.key==='Escape'){ this.setState({tocOpen:false}); return; }\n      if(this.state.view!=='reading') return;\n      if(e.key==='ArrowLeft' || e.key===' '){ e.preventDefault(); this.go(1); }\n      else if(e.key==='ArrowRight'){ e.preventDefault(); this.go(-1); }\n    };\n    window.addEventListener('keydown', this._onKey);\n\n    const boot = ()=>{\n      if(window.__BOOK){\n        this.book = window.__BOOK;\n        this.book.sections.forEach(s=>{ if(s.kind!=='teaser') s.blocks = this._parse(s.raw); });\n        this.N = this.book.sections.length;\n        let saved=null;\n        try{ const r=JSON.parse(localStorage.getItem(KEY)); if(r && typeof r.ci==='number') saved=r; }catch(e){}\n        this.setState({ booted:true, saved });\n      } else { setTimeout(boot, 40); }\n    };\n    boot();\n\n    if(document.fonts && document.fonts.ready){\n      document.fonts.ready.then(()=>{ this.fontsReady=true; this.pages={}; this.forceUpdate(); });\n    } else { this.fontsReady=true; }\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n    clearTimeout(this._safe);\n  }\n\n  componentDidUpdate(prevProps){\n    if(prevProps && prevProps.textScale !== this.props.textScale){\n      this.pages={}; this._clamp();\n    }\n    if(this.state.view==='reading' && this.fontsReady && this.contentRef.current){\n      const ci=this.state.ci;\n      if(!this.pages[ci]){ this.pages[ci]=this._build(ci); this.forceUpdate(); }\n    }\n  }\n\n  _layout(){\n    const vw=window.innerWidth, vh=window.innerHeight;\n    let ph=Math.min(vh-118, 900); ph=Math.max(ph, 340);\n    let pw=Math.round(ph*0.74);\n    const maxw=vw-32;\ > (s.turn && s.turn.id===id) ? { turn:{...s.turn, phase:'end'} } : null);\n    }));\n    clearTimeout(this._safe);\n    this._safe=setTimeout(()=>this._commit(id), 780);\n  }\n\n  _commit(id){\n    const t=this.state.turn;\n    if(!t || t.id!==id) return;\n    clearTimeout(this._safe);\n    this.setState({ ci:t.toCi, pi:t.toPi, turn:null }, ()=>this._save());\n  }\n\n  _save(){\n    const p={ci:this.state.ci, pi:this.state.pi};\n    try{ localStorage.setItem(KEY, JSON.stringify(p)); }catch(e){}\n    this.setState({saved:p});\n  }\n\n  _secLabel(ci){\n    const s=this.book.sections[ci];\n    if(!s) return '';\n    if(s.kind==='chapter') return 'פרק '+s.num+' · '+s.title;\n    return s.title || s.label || '';\n  }\n\n  _pageData(ci, pi){\n    const sec=this.book.sections[ci];\n    const pages=this.pages[ci] || [{title:true}];\n    const pg=pages[pi] || pages[0] || {title:true};\n    const runHead = sec.kind==='chapter' ? ('פרק '+sec.num) : (sec.label||sec.title||'');\n    const out={ runHead, folio:'', isTitle:!!pg.title, isTeaser:!!pg.teaser, isFlow:!!pg.blocks, isImage:!!pg.image, imageSrc:pg.image||'',\n                hasNum:false, titleNum:'', titleMain:'', hasSub:false, titleSub:'', blocks:[] };\n    if(pg.title){\n      if(sec.kind==='chapter'){ out.hasNum=true; out.titleNum=String(sec.num); out.titleMain=sec.title; }\n      else { out.titleMain = sec.title || sec.label; if(sec.subtitle){ out.hasSub=true; out.titleSub=sec.subtitle; } }\n    }\n    if(pg.blocks){\n      const f=this._f(), accent=this._accent();\n      const flow=pages.filter(p=>p.blocks);\n      out.folio = (flow.indexOf(pg)+1)+' · '+flow.length;\n      out.blocks = pg.blocks.map((b,i)=>({ key:ci+'-'+pi+'-'+i, style:this._styleObj(b,f,accent), text: b.type==='gap'?'':b.text }));\n    }\n    return out;\n  }\n\n  pickToc(i){\n    this.pages={};\n    this.setState({ ci:i, pi:0, tocOpen:false, view:'reading', turn:null }, ()=>this._save());\n  }\n\n  renderVals(){\n    const accent=this._accent();\n    const s=this.state;\n    const booted=s.booted && this.book;\n    const isReading = s.view==='reading';\n\n    const vals = {\n      accent,\n      isCover: s.view==='cover',\n      isReading,\n      tocOpen: s.tocOpen,\n      pw: s.pw, ph: s.ph,\n      contentRef: this.contentRef,\n      hasSaved: !!(s.saved && (s.saved.ci>0 || s.saved.pi>0)),\n      savedLabel: s.saved ? this._secLabel(s.saved.ci) : '',\n      chapterNumStyle: { fontSize:'clamp(56px,12vh,94px)', fontWeight:'300', color:accent, lineHeight:'1', margin:'10px 0 16px' },\n      teaserBtnStyle: { background:accent, border:'none', color:'#fff', textDecoration:'none', fontSize:'15px', fontWeight:'500', letterSpacing:'.06em', padding:'14px 36px', borderRadius:'40px', boxShadow:'0 8px 20px -6px rgba(120,80,50,.5)', cursor:'pointer' },\n      onStart: ()=>this.setState({ view:'reading', ci:0, pi:0, turn:null }),\n      onResume: ()=>{ const p=s.saved||{ci:0,pi:0}; this.pages={}; this.setState({ view:'reading', ci:p.ci, pi:p.pi, turn:null }); },\n      onCover: ()=>this.setState({ view:'cover', turn:null }),\n      onOpenToc: ()=>this.setState({ tocOpen:true }),\n      onCloseToc: ()=>this.setState({ tocOpen:false }),\n      onNext: ()=>this.go(1),\n      onPrev: ()=>this.go(-1),\n      onNextZone: ()=>this.go(1),\n      onPrevZone: ()=>this.go(-1),\n      onLeafEnd: (e)=>{ if(e && e.propertyName && e.propertyName!=='transform') return; const t=this.state.turn; if(t) this._commit(t.id); }\n    };\n\n    if(!booted){ return vals; }\n\n    // base + leaf page selection\n    let baseCi=s.ci, basePi=s.pi, leaf=null;\n    if(s.turn){\n      if(s.turn.dir==='next'){ baseCi=s.turn.toCi; basePi=s.turn.toPi; leaf={ci:s.turn.fromCi, pi:s.turn.fromPi}; }\n      else { baseCi=s.turn.fromCi; basePi=s.turn.fromPi; leaf={ci:s.turn.toCi, pi:s.turn.toPi}; }\n    }\n    const base=this._pageData(baseCi, basePi);\n\n    vals.baseRunHead = base.runHead;\n    vals.baseFolio = base.folio;\n    vals.baseIsTitle = base.isTitle;\n    vals.baseIsTeaser = base.isTeaser;\n    vals.baseIsFlow = base.isFlow;\n    vals.baseIsImage = base.isImage;\n    vals.baseImageEl = base.isImage ? React.createElement('img', { src: base.imageSrc, alt:'', style:{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'contain', background:'#FCFBF7', animation:'fadeIn .5s ease both' } }) : null;\n    vals.baseHasNum = base.hasNum;\n    vals.baseTitleNum = base.titleNum;\n    vals.baseTitleMain = base.titleMain;\n    vals.baseHasSub = base.hasSub;\n    vals.baseTitleSub = base.titleSub;\n    vals.baseBlocks = base.blocks;\n\n    // teaser fields\n    const teaserSec = this.book.sections.find(x=>x.kind==='teaser');\n    if(teaserSec){\n      vals.teaserKicker = teaserSec.kicker;\n      vals.teaserTitle = teaserSec.title;\n      vals.teaserDesc = teaserSec.desc.map((d,i)=>({key:'td'+i, ...{} , toString:()=>d}));\n      vals.teaserDesc = teaserSec.desc.slice();\n      vals.teaserCloser = teaserSec.closer;\n      vals.teaserCta = teaserSec.cta;\n      vals.book2Url = this.props.book2Url || '#';\n    }\n\n    vals.turning = !!s.turn;\n    if(s.turn && leaf){\n      const ld=this._pageData(leaf.ci, leaf.pi);\n      vals.leafRunHead = ld.runHead;\n      vals.leafFolio = ld.folio;\n      vals.leafIsTitle = ld.isTitle;\n      vals.leafIsFlow = ld.isFlow;\n      vals.leafIsImage = ld.isImage;\n      vals.leafImageEl = ld.isImage ? React.createElement('img', { src: ld.imageSrc, alt:'', style:{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'contain', background:'#FCFBF7' } }) : null;\n      vals.leafHasNum = ld.hasNum;\n      vals.leafTitleNum = ld.titleNum;\n      vals.leafTitleMain = ld.titleMain;\n      vals.leafHasSub = ld.hasSub;\n      vals.leafTitleSub = ld.titleSub;\n      vals.leafBlocks = ld.blocks;\n      let rot;\n      if(s.turn.phase==='start') rot = s.turn.dir==='next' ? 0 : -178;\n      else rot = s.turn.dir==='next' ? -178 : 0;\n      vals.leafInnerStyle = {\n        position:'absolute', inset:0, transformOrigin:'right center',\n        transformStyle:'preserve-3d', WebkitTransformStyle:'preserve-3d',\n        transform:'rotateY('+rot+'deg)',\n        transition: s.turn.phase==='start' ? 'none' : 'transform .66s cubic-bezier(.42,0,.22,1)',\n        willChange:'transform'\n      };\n    }\n\n    // TOC\n    vals.tocItems = this.book.sections.map((sec,i)=>{\n      const active = i===s.ci;\n      const isCh = sec.kind==='chapter';\n      return {\n        key:'toc'+i,\n        num: isCh ? String(sec.num) : '·',\n        label: isCh ? sec.title : (sec.title || sec.label),\n        onPick: ()=>this.pickToc(i),\n        rowStyle: { display:'flex', alignItems:'center', gap:'16px', width:'100%', textAlign:'right', background: active?'#ece4d6':'transparent', border:'none', borderRadius:'10px', padding:'13px 14px', cursor:'pointer', fontFamily:\"'Assistant',sans-serif\", fontSize:'16px', fontWeight: active?'600':'400', color: active?'#2a2620':'#5d5547', transition:'background .18s,color .18s' },\n        numStyle: { width:'24px', flex:'none', textAlign:'center', fontSize:'14px', fontWeight:'500', color: active?accent:'#b3a892' }\n      };\n    });\n\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
